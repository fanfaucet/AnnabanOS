apiVersion: apps/v1
kind: Deployment
metadata:
  name: annaban-governance-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: annaban-governance-runner
  template:
    metadata:
      labels:
        app: annaban-governance-runner
    spec:
      containers:
      - name: runner
        image: annaban/benchmark:latest
        env:
        - name: ANNABAN_MODE
          value: governance-middleware
